spring.application.name=flowvisior
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:1337/flowvisior
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

server.servlet.session.timeout=${SESSION_TIMEOUT:30m}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:}
telegram.polling.enabled=${TELEGRAM_POLLING_ENABLED:true}
telegram.polling.drop-pending-updates=${TELEGRAM_DROP_PENDING_UPDATES:false}
telegram.polling.timeout-seconds=${TELEGRAM_POLLING_TIMEOUT_SECONDS:25}
telegram.reminders.fixed-delay-ms=${TELEGRAM_REMINDERS_FIXED_DELAY_MS:60000}
